<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HLS 管理</title>
    <style>
        body { font-family: -apple-system, "PingFang SC", sans-serif; margin: 24px; color: #222; }
        h1 { margin: 0 0 16px; font-size: 20px; }
        h2 { margin: 24px 0 12px; font-size: 16px; }
        form.upload { padding: 16px; background: #f6f8fa; border-radius: 8px; display: grid; grid-template-columns: 140px 1fr; gap: 8px 12px; align-items: center; max-width: 640px; }
        form.upload label { font-size: 13px; color: #555; }
        form.upload input[type=text], form.upload input[type=number], form.upload input[type=file] { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        form.upload .hint { grid-column: 2; font-size: 12px; color: #888; margin-top: -4px; }
        form.upload .actions { grid-column: 2; margin-top: 8px; }
        form.upload button { padding: 8px 16px; background: #0969da; color: white; border: 0; border-radius: 4px; font-size: 14px; cursor: pointer; }
        form.upload button:disabled { background: #999; cursor: wait; }
        table.episodes { width: 100%; border-collapse: collapse; font-size: 13px; }
        table.episodes th, table.episodes td { padding: 8px 10px; border-bottom: 1px solid #eee; text-align: left; vertical-align: top; }
        table.episodes th { background: #f6f8fa; font-weight: 600; color: #555; }
        .cover { width: 96px; height: 54px; background: #eee; border-radius: 4px; object-fit: cover; cursor: pointer; display: block; }
        .cover.placeholder { display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 11px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .badge.pending { background: #fff3cd; color: #664d03; }
        .badge.encoding { background: #cfe2ff; color: #084298; }
        .badge.ready { background: #d1e7dd; color: #0f5132; }
        .badge.failed { background: #f8d7da; color: #842029; }
        details.error { margin-top: 4px; }
        details.error pre { background: #fff; border: 1px solid #f5c2c7; padding: 6px; font-size: 11px; white-space: pre-wrap; word-break: break-all; max-width: 500px; }
        .meta { color: #888; font-size: 11px; }
        .mono { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: #444; }
        .btn-delete { padding: 4px 10px; background: #d73a49; color: white; border: 0; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .btn-delete:hover { background: #b02a37; }
        .btn-delete:disabled { background: #999; cursor: wait; }
        .actions-col { white-space: nowrap; }
    </style>
</head>
<body>
    <h1>HLS 流媒体管理</h1>

    <form class="upload" id="upload-form">
        <label for="drama_slug">短剧 slug</label>
        <input type="text" id="drama_slug" name="drama_slug" required
               pattern="^[a-z0-9][a-z0-9-]*$"
               placeholder="例如 langyabang（小写字母、数字、连字符）">
        <div class="hint">用于目录名和 URL，只能小写字母/数字/连字符，首字符非连字符</div>

        <label for="drama_name">剧名（展示用）</label>
        <input type="text" id="drama_name" name="drama_name" required maxlength="200"
               placeholder="例如 琅琊榜">

        <label for="ep_number">集数</label>
        <input type="number" id="ep_number" name="ep_number" required min="1" step="1">

        <label for="video">视频文件</label>
        <input type="file" id="video" name="video" required accept="video/*">

        <div class="actions">
            <button type="submit" id="submit-btn">上传并开始编码</button>
        </div>
    </form>

    <h2>当前剧集</h2>
    <table class="episodes">
        <thead>
            <tr>
                <th>封面</th>
                <th>剧名 / 集数</th>
                <th>状态</th>
                <th>时长</th>
                <th>上传时间</th>
                <th>链接</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="episodes-body">
            <tr><td colspan="7" class="meta">加载中…</td></tr>
        </tbody>
    </table>

    <input type="file" id="cover-picker" accept="image/*" style="display:none">

    <script>
    const $body = document.getElementById('episodes-body');
    const $picker = document.getElementById('cover-picker');
    let pickerTarget = null;

    function fmtDuration(ms) {
        if (ms == null) return '—';
        const s = Math.round(ms / 1000);
        const m = Math.floor(s / 60);
        const r = s - m * 60;
        return `${m}:${String(r).padStart(2, '0')}`;
    }

    function fmtTime(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        if (isNaN(d)) return iso;
        return d.toLocaleString();
    }

    function render(rows) {
        if (!rows.length) {
            $body.innerHTML = '<tr><td colspan="6" class="meta">暂无剧集，使用上方表单上传。</td></tr>';
            return;
        }
        $body.innerHTML = rows.map(r => {
            const coverSrc = r.cover_url
                ? `${r.cover_url}?t=${encodeURIComponent(r.updated_at || '')}`
                : '';
            const coverHtml = coverSrc
                ? `<img class="cover" src="${coverSrc}"
                        data-slug="${r.drama_slug}" data-ep="${r.ep_number}"
                        title="点击替换封面">`
                : `<div class="cover placeholder"
                        data-slug="${r.drama_slug}" data-ep="${r.ep_number}"
                        title="点击上传封面">无封面</div>`;
            const errBlock = r.status === 'failed' && r.error_message
                ? `<details class="error"><summary>查看错误</summary><pre>${escapeHtml(r.error_message)}</pre></details>`
                : '';
            const playLink = r.play_url
                ? `<a href="${r.play_url}" target="_blank" class="mono">m3u8</a>`
                : '<span class="meta">—</span>';
            const deleteDisabled = r.status === 'encoding' ? 'disabled title="编码中不能删除"' : '';
            return `<tr>
                <td>${coverHtml}</td>
                <td>
                    <div>${escapeHtml(r.drama_name)} <span class="meta">·</span> 第 ${r.ep_number} 集</div>
                    <div class="mono meta">${escapeHtml(r.episode_id)}</div>
                    ${errBlock}
                </td>
                <td><span class="badge ${r.status}">${r.status}</span></td>
                <td>${fmtDuration(r.duration_ms)}</td>
                <td class="meta">${fmtTime(r.created_at)}</td>
                <td>${playLink}</td>
                <td class="actions-col">
                    <button class="btn-delete"
                            data-slug="${r.drama_slug}" data-ep="${r.ep_number}"
                            data-name="${escapeHtml(r.drama_name)}"
                            ${deleteDisabled}>删除</button>
                </td>
            </tr>`;
        }).join('');
    }

    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, ch => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        })[ch]);
    }

    async function refresh() {
        try {
            const res = await fetch('/admin/episodes');
            const rows = await res.json();
            render(rows);
        } catch (e) {
            $body.innerHTML = `<tr><td colspan="6" class="meta">加载失败：${escapeHtml(e)}</td></tr>`;
        }
    }

    $body.addEventListener('click', (ev) => {
        const delBtn = ev.target.closest('.btn-delete');
        if (delBtn) {
            const slug = delBtn.dataset.slug;
            const ep = delBtn.dataset.ep;
            const name = delBtn.dataset.name || slug;
            if (!confirm(`确定删除《${name}》第 ${ep} 集？此操作不可恢复。`)) return;
            deleteEpisode(delBtn, slug, ep);
            return;
        }
        const el = ev.target.closest('.cover');
        if (!el) return;
        pickerTarget = { slug: el.dataset.slug, ep: el.dataset.ep };
        $picker.value = '';
        $picker.click();
    });

    async function deleteEpisode(btn, slug, ep) {
        btn.disabled = true;
        btn.textContent = '删除中…';
        try {
            const res = await fetch(`/admin/episodes/${slug}/${ep}`, { method: 'DELETE' });
            if (!res.ok) {
                const txt = await res.text();
                alert(`删除失败 (${res.status}): ${txt}`);
                btn.disabled = false;
                btn.textContent = '删除';
                return;
            }
            const body = await res.json();
            if (body.warnings && body.warnings.length) {
                alert('删除成功，但有以下残留文件需要手动清理：\n' + body.warnings.join('\n'));
            }
            await refresh();
        } catch (e) {
            alert('删除出错: ' + e);
            btn.disabled = false;
            btn.textContent = '删除';
        }
    }

    $picker.addEventListener('change', async () => {
        if (!pickerTarget || !$picker.files.length) return;
        const form = new FormData();
        form.append('cover', $picker.files[0]);
        const url = `/api/episodes/${pickerTarget.slug}/${pickerTarget.ep}/cover`;
        try {
            const res = await fetch(url, { method: 'POST', body: form });
            if (!res.ok) {
                const txt = await res.text();
                alert('封面上传失败: ' + txt);
                return;
            }
            await refresh();
        } catch (e) {
            alert('封面上传出错: ' + e);
        } finally {
            pickerTarget = null;
        }
    });

    document.getElementById('upload-form').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const form = ev.target;
        const slug = form.drama_slug.value;
        if (!/^[a-z0-9][a-z0-9-]*$/.test(slug)) {
            alert('drama_slug 格式非法');
            return;
        }
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = '上传中…';
        const data = new FormData(form);
        try {
            const res = await fetch('/admin/upload', { method: 'POST', body: data, redirect: 'manual' });
            // FastAPI 返回 302 → /admin；fetch 'manual' 模式不跟随，直接刷新列表即可
            if (res.type === 'opaqueredirect' || res.ok || res.status === 302) {
                form.reset();
                await refresh();
            } else {
                const txt = await res.text();
                alert('上传失败: ' + txt);
            }
        } catch (e) {
            alert('上传出错: ' + e);
        } finally {
            btn.disabled = false;
            btn.textContent = '上传并开始编码';
        }
    });

    refresh();
    setInterval(refresh, 5000);
    </script>
</body>
</html>
