{% extends "_base.html" %}
{% block title %}修改密码 · HLS 管理{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <header class="mb-6 pb-4 border-b border-outline-variant">
        <h1 class="text-headline-lg text-on-surface flex items-center gap-2">
            <span class="material-symbols-outlined text-secondary-fixed-dim">key</span>
            修改密码
        </h1>
    </header>

    {% if must_change %}
    <div class="mb-4 px-3 py-2 rounded-md bg-status-warn/15 text-status-warn text-body-sm">
        首次登录或密码被管理员重置，请先设置一个新密码再继续。
    </div>
    {% endif %}

    {% if error %}
    <div class="mb-4 px-3 py-2 rounded-md bg-error-container text-on-error text-body-sm">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/admin/account/password"
          class="bg-surface-container-high border border-outline-variant rounded-lg p-5 flex flex-col gap-4">
        <div class="flex flex-col gap-1.5">
            <label class="text-body-sm text-on-surface-variant">当前密码</label>
            <input type="password" name="current_password" required autocomplete="current-password">
        </div>
        <div class="flex flex-col gap-1.5">
            <label class="text-body-sm text-on-surface-variant">新密码</label>
            <input type="password" name="new_password" required minlength="6"
                   autocomplete="new-password" placeholder="至少 6 位">
        </div>
        <div class="flex flex-col gap-1.5">
            <label class="text-body-sm text-on-surface-variant">确认新密码</label>
            <input type="password" name="confirm_password" required minlength="6"
                   autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary mt-1">
            <span class="material-symbols-outlined text-[18px]">check</span>
            保存新密码
        </button>
    </form>
</div>
{% endblock %}
