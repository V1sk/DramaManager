services:
  hls:
    build: .
    container_name: hls
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # All persistent state under ./data: ./data/out (encoded segments),
      # ./data/hls.db (SQLite), ./data/tmp (upload staging). The container
      # env (set in the Dockerfile) points OUT_DIR / DB_PATH / UPLOAD_TMP_DIR
      # at /data/... — first `docker compose up` creates the dirs on demand.
      - ./data:/data
      # OSS / TOS credentials (only needed when STORAGE_PROVIDER != none).
      # Workflow:
      #   1) cp app/storage/credentials.example.py app/storage/credentials.py
      #   2) fill in your AK / SK
      #   3) uncomment the line below + restart
      # The file is gitignored and excluded from the image build context, so
      # the only way it reaches the container is this bind mount.
      # - ./app/storage/credentials.py:/app/app/storage/credentials.py:ro
