services:
  hls:
    build: .
    container_name: hls
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # All persistent state under ./data: ./data/out (encoded segments),
      # ./data/hls.db (SQLite), ./data/tmp (upload staging). The container
      # env (set in the Dockerfile) points OUT_DIR / DB_PATH / UPLOAD_TMP_DIR
      # at /data/... — first `docker compose up` creates the dirs on demand.
      - ./data:/data
      # OSS / TOS credentials are baked into the image at build time
      # (app/storage/credentials.py is NOT in .dockerignore). Internal-only
      # deployment; after rotating keys run `docker compose up -d --build`.
